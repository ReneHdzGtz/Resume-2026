<svg width="1200" height="630" viewBox="0 0 1200 630" role="img" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .heading-main { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif; font-weight: 700; }
      .badge-text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif; font-weight: 600; }
      .body-text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif; font-weight: 400; }
      .stats-number { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif; font-weight: 700; }
      .stats-label { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif; font-weight: 400; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0a"/>
  
  <!-- Content Area -->
  <g>
    <!-- Badge -->
    <rect x="50" y="60" width="340" height="50" rx="25" fill="#2a2415" stroke="#C9A961" stroke-width="1.5"/>
    <text x="70" y="92" class="badge-text" style="font-size: 14px; fill: #C9A961; letter-spacing: 1px;">
      MARKETING LEAD • WEB3 & WEB2
    </text>
    
    <!-- Main Name - René (white) -->
    <text x="50" y="210" class="heading-main" style="font-size: 88px; fill: #ffffff; line-height: 1;">
      René
    </text>
    
    <!-- Accent slash before Hernández -->
    <text x="350" y="210" class="heading-main" style="font-size: 88px; fill: #C9A961;">
      /
    </text>
    
    <!-- Main Name - Hernández (gold) -->
    <text x="50" y="330" class="heading-main" style="font-size: 88px; fill: #C9A961; line-height: 1;">
      Hernández
    </text>
    
    <!-- Underline -->
    <line x1="50" y1="350" x2="850" y2="350" stroke="#C9A961" stroke-width="4"/>
    
    <!-- Description -->
    <text x="50" y="410" class="body-text" style="font-size: 18px; fill: #b0b0b0; line-height: 1.6; max-width: 850px;">
      I build communities, amplify brands, and connect the dots between
    </text>
    <text x="50" y="440" class="body-text" style="font-size: 18px; fill: #b0b0b0; line-height: 1.6; max-width: 850px;">
      content strategy and real growth across Web3 DAOs, crypto protocols,
    </text>
    <text x="50" y="470" class="body-text" style="font-size: 18px; fill: #b0b0b0; line-height: 1.6; max-width: 850px;">
      and established brands.
    </text>
    
    <!-- Stats Section -->
    <g>
      <!-- Stat 1 -->
      <text x="50" y="560" class="stats-number" style="font-size: 40px; fill: #C9A961;">
        10+
      </text>
      <text x="50" y="590" class="stats-label" style="font-size: 14px; fill: #888888;">
        Years experience
      </text>
      
      <!-- Stat 2 -->
      <text x="280" y="560" class="stats-number" style="font-size: 40px; fill: #C9A961;">
        8+
      </text>
      <text x="280" y="590" class="stats-label" style="font-size: 14px; fill: #888888;">
        Web3 projects
      </text>
      
      <!-- Stat 3 -->
      <text x="500" y="560" class="stats-number" style="font-size: 40px; fill: #C9A961;">
        50%
      </text>
      <text x="500" y="590" class="stats-label" style="font-size: 14px; fill: #888888;">
        Avg. organic reach
      </text>
      
      <!-- Stat 4 -->
      <text x="800" y="560" class="stats-number" style="font-size: 40px; fill: #C9A961;">
        400+
      </text>
      <text x="800" y="590" class="stats-label" style="font-size: 14px; fill: #888888;">
        LATAM builders
      </text>
    </g>
  </g>
</svg>
